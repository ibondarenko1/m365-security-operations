name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pester:
    name: Pester (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: |
          $needsInstall = $true
          $existing = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge "5.0.0" }
          if ($existing) { $needsInstall = $false }
          if ($needsInstall) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser
          }

      - name: Run Pester suite
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = "tests"
          $config.Output.Verbosity = "Normal"
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) Pester tests failed."
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed."

  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          set -e
          fail=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./reports/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "INVALID JSON: $f"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then exit 1; fi
          echo "All JSON files valid."

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Get-ChildItem -Path . -Recurse -Include *.ps1,*.psm1 |
            Where-Object { $_.FullName -notmatch '/reports/' } |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found errors"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean (Error severity)."

      - name: KQL files non-empty + header
        run: |
          set -e
          for f in 01-sentinel-detection-engineering/kql/*.kql; do
            if [ ! -s "$f" ]; then echo "EMPTY: $f"; exit 1; fi
            head -1 "$f" | grep -q "^//" || { echo "NO HEADER: $f"; exit 1; }
          done
          echo "All KQL files non-empty with headers."

      - name: Fixture sanity (no real GUIDs)
        run: |
          set -e
          # Allow synthetic GUIDs (all 0s, all 1s, etc.) and well-known Microsoft role template IDs
          # Reject only suspicious-looking GUIDs in fixtures.
          if grep -rE '\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b' examples/fixtures/ \
              | grep -v "00000000-0000-0000-0000-000000000000" \
              | grep -v "11111111-1111-1111-1111-111111111111" \
              | grep -v "22222222-2222-2222-2222-222222222222" \
              | grep -v -E "[34567]{8}-[34567]{4}" \
              | grep -v "62e90394-69f5-4237-9190-012177145e10" \
              | grep -v "194ae4cb-b126-40b2-bd5b-6091b380977d" \
              | grep -v "29232cdf-9323-42fd-ade2-1d097af3e4de" \
              | grep -v "fe930be7-5e62-47db-91af-98c3a49a38b1" \
              | grep -v "f28a1f50-f6e7-4571-818b-6a12f2af6b6c" \
              | grep -v "69091246-20e8-4a56-aa4d-066075b2a7a8" \
              | grep -v "00000003-0000-0000-c000-000000000000"; then
            echo "WARNING: non-synthetic GUIDs found in fixtures - review for tenant data leak."
            # Warn-only for now
          fi
          echo "Fixture sanity check complete."
